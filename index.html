<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Raj Amar Varma YouTube Videos</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
background:red;
padding:15px;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.video{
width:300px;
margin:15px;
background:#1e1e1e;
border-radius:10px;
overflow:hidden;
}

.video img{
width:100%;
}

.video h3{
font-size:16px;
padding:10px;
}

a{
text-decoration:none;
color:white;
}
</style>

</head>

<body>

<header>
Raj Amar Varma YouTube Videos
</header>

<div id="videos" class="container"></div>

<script>

let rssURL = "https://www.youtube.com/feeds/videos.xml?user=raj_amarvarma";

fetch("https://api.rss2json.com/v1/api.json?rss_url=" + rssURL)
.then(res => res.json())
.then(data => {

let output="";

data.items.forEach(video => {

output += `
<div class="video">
<a href="${video.link}" target="_blank">
<img src="${video.thumbnail}">
<h3>${video.title}</h3>
</a>
</div>
`;

});

document.getElementById("videos").innerHTML = output;

});

</script>

</body>
</html>
